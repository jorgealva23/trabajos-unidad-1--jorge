<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos para el ejemplo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333
        }

        h1 {
            color: #1565c0;
            border-bottom:
#4a90e2;
            padding-bottom: 10px;
        }

        .destacado {
            background-color: #e3f2fd;
            border-left: 4px solid #2e7d32;
            padding: 15px;
            border-radius: 0 4px 4px 0;
        }

        .codigo {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f5f5f5;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Mi Primera Página con Estilo</h1>

    <p>Este es un párrafo normal con texto de ejemplo para mostrar cómo se aplican los estilos CSS.</p>

    <p class="destacado">¡Este párrafo está destacado gracias a una clase CSS! Observa cómo el fondo es distinto.</p>

    <p>Podemos usar la etiqueta <code class="codigo">&lt;code&gt;</code> para mostrar código en línea.</p>
</body>
</html>
