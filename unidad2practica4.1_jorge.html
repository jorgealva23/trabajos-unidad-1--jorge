<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            display: block; /* Valor por defecto para div, p, h1-h6, section, etc. */
            width: 200px; /* Podemos definir un ancho */
            height: 50px; /* Y un alto */
            background-color: lightblue; /* Para visualizar el bloque */
            border: 2px solid blue; /* Para visualizar el borde */
            margin: 10px; /* Espacio fuera del bloque */
        }
    </style>
</head>
<body>
    <div>caja 1</div>
    <div>caja 2</div>
    <div>caja 3</div>
</body>
</html>
