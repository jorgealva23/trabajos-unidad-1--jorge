<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <tittle>Document</tittle>
    <style>
        p{
        /* Familia tipografica */
        font-family: 'Arial', sans-serif;

        /* Tamaño de fuente */
        font-size: 16px; /* o 1em, 100%, 1rem*/

        /* Grosor de la fuente */
        font-weight: normal; /* o bold, 100-900 */

        /* Estilo de la fuente */
        font-style: normal; /* o italic, oblique */

        /* Transformacion de texto */
        text-transform: none; /* o uppercase, lowercase, capitalize */

        /* Decoracion de texto */
        text-decoration: none; /* o underline, line-through, overline */

        /* Alineacion de texto */
        text-align: left; /* o center, right, justify */

        /* Altura de linea */
        line-height: 1.5;

        /* Espaciado entre letras */
        letter-spacing: 1px;

        /* Espaciado entre palabras */
        word-spacing: 2px;
        }
    </style>
</head>
<body>
    <p>el josh manda a dess</p>
</body>
</html>
